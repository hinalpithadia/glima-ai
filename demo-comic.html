<body class="lg:overflow-hidden bg-black-0a0a0a">

  <!-- RIGHT SIDE (FULL HEIGHT) -->
 <div class="absolute right-0 top-0 h-full w-[36%] hidden lg:block z-0">

  [clip-path:polygon(15%_0,100%_0,100%_100%,0_100%)]">

  <!-- CENTER CONTENT -->

      Built for Modern Story Creators

</section>
    <!-- MAIN JS-->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/rangeslider.js/dist/rangeslider.min.js"></script>
    <script src="assets/js/main.js"></script>
    <script>
        const createBtn = document.getElementById("create")
        const myCreationBtn = document.getElementById("my-creation")

        const createSection = document.getElementById("create-section")
        const myCreationSection = document.getElementById("my-creation-section")

        function isSmallScreen() {
            return window.innerWidth < 1024
        }

        function showCreate() {
            if (!isSmallScreen()) return

            createSection.classList.remove("hidden")
            myCreationSection.classList.add("hidden")

            createBtn.classList.add("active-tab")
            myCreationBtn.classList.remove("active-tab")
        }

        function showMyCreation() {
            if (!isSmallScreen()) return

            myCreationSection.classList.remove("hidden")
            createSection.classList.add("hidden")

            myCreationBtn.classList.add("active-tab")
            createBtn.classList.remove("active-tab")
        }

        // Button Clicks
        createBtn.addEventListener("click", showCreate)
        myCreationBtn.addEventListener("click", showMyCreation)

        /* ✅ IMPORTANT FIX */
        let lastWidth = window.innerWidth

        window.addEventListener("resize", () => {
            const currentWidth = window.innerWidth

            // ❌ Ignore resize caused by scroll (height-only changes)
            if (currentWidth === lastWidth) return

            lastWidth = currentWidth

            if (!isSmallScreen()) {
                // Desktop → Show both
                createSection.classList.remove("hidden")
                myCreationSection.classList.remove("hidden")

                createBtn.classList.remove("active-tab")
                myCreationBtn.classList.remove("active-tab")
            } else {
                // Mobile → Default only ON REAL WIDTH CHANGE
                showCreate()
            }
        })

        // Initial Load
        if (isSmallScreen()) {
            showCreate()
        }
    </script>

    <script>
        const cards = document.querySelectorAll('.card');

        cards.forEach(card => {
            card.addEventListener('click', () => {

                if (card.classList.contains('card-active')) {
                    card.classList.remove('card-active');
                } else {

                    cards.forEach(c => c.classList.remove('card-active'));

                    card.classList.add('card-active');
                }

            });
        });
    </script>
    <script>
        let isOpen = false;

        function toggleAdvanced() {
            const content = document.getElementById("advancedContent");
            const icon = document.getElementById("arrowIcon");

            if (!isOpen) {
                // OPEN
                content.style.height = content.scrollHeight + "px";

                content.addEventListener("transitionend", function handler() {
                    content.style.height = "auto";
                    content.removeEventListener("transitionend", handler);
                });

                icon.classList.add("rotate-180");
                isOpen = true;

            } else {
                // CLOSE
                content.style.height = content.scrollHeight + "px";

                requestAnimationFrame(() => {
                    content.style.height = "0px";
                });

                icon.classList.remove("rotate-180");
                isOpen = false;
            }
        }
    </script>

    <script>
        function toggleBtn(btn) {
            const defaultImg = btn.querySelector('.btn-img-default');
            const activeImg = btn.querySelector('.btn-img-active');

            const isActive = btn.classList.contains('active');

            if (isActive) {
                btn.classList.remove('active');
                defaultImg.classList.remove('hidden');
                activeImg.classList.add('hidden');
            } else {
                btn.classList.add('active');
                defaultImg.classList.add('hidden');
                activeImg.classList.remove('hidden');
            }
        }
    </script>

</body>

</html>
